# Netlify configuration — publish the site/ directory (no build step)
[build]
  command = "npm run build"
  publish = "site"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["data/careers-fallback.json"]

# Careers + Notion API
[[redirects]]
  from = "/api/jobs"
  to = "/.netlify/functions/jobs"
  status = 200
[[redirects]]
  from = "/api/job-application"
  to = "/.netlify/functions/job-application"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively
[[headers]]
  for = "/assets/css/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Friendly URLs: /careers works same as /careers.html
[[redirects]]
  from = "/careers"
  to = "/careers.html"
  status = 200
